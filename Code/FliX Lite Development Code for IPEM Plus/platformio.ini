; [platformio]
; default_envs = development

[env:esp32c5]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c5-devkitc-1
framework = arduino

upload_speed = 921600
monitor_speed = 115200

; Optional Fixed Com Port. This is useful if you have other COM devices and Auto does not work.
; upload_port = COM68
; monitor_port = COM68

lib_deps = 
	gyverlibs/GyverOLED@^1.6.1
	adafruit/Adafruit NeoPixel @ ^1.15.5
	
